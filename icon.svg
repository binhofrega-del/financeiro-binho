<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo preto arredondado -->
  <rect width="512" height="512" rx="110" fill="#111111"/>

  <!-- Barras do gráfico (verde) -->
  <rect x="60" y="340" width="55" height="110" rx="8" fill="#1a7a2e" opacity="0.85"/>
  <rect x="130" y="290" width="55" height="160" rx="8" fill="#1e9435" opacity="0.9"/>
  <rect x="320" y="220" width="55" height="230" rx="8" fill="#22aa3c" opacity="0.95"/>
  <rect x="390" y="160" width="55" height="290" rx="8" fill="#26c244"/>

  <!-- Linha de tendência (seta) -->
  <polyline points="80,370 175,290 270,220 400,120" fill="none" stroke="#2ecc54" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seta no final -->
  <polygon points="380,95 430,95 430,145" fill="#2ecc54"/>

  <!-- Símbolo $ (dourado) -->
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-size="210" font-weight="900" fill="url(#gold)" text-anchor="middle">$</text>

  <!-- Gradiente dourado -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="50%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#a07010"/>
    </linearGradient>
  </defs>
</svg>
